naftiko: 1.0.0-alpha2
info:
  label: Hoverfly Admin API — Cache
  description: 'Hoverfly Admin API — Cache. 2 operations. Lead operation: Get cache. Self-contained Naftiko capability covering
    one Hoverfly business surface.'
  tags:
  - Hoverfly
  - Cache
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HOVERFLY_API_KEY: HOVERFLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: hoverfly-cache
    baseUri: http://localhost:8888
    description: Hoverfly Admin API — Cache business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-cache
      path: /api/v2/cache
      operations:
      - name: getcache
        method: GET
        description: Get cache
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: clearcache
        method: DELETE
        description: Clear cache
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: hoverfly-cache-rest
    port: 8080
    description: REST adapter for Hoverfly Admin API — Cache. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/cache
      name: api-v2-cache
      description: REST surface for api-v2-cache.
      operations:
      - method: GET
        name: getcache
        description: Get cache
        call: hoverfly-cache.getcache
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: clearcache
        description: Clear cache
        call: hoverfly-cache.clearcache
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hoverfly-cache-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hoverfly Admin API — Cache. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-cache
      description: Get cache
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hoverfly-cache.getcache
      outputParameters:
      - type: object
        mapping: $.
    - name: clear-cache
      description: Clear cache
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: hoverfly-cache.clearcache
      outputParameters:
      - type: object
        mapping: $.
