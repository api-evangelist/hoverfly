naftiko: 1.0.0-alpha2
info:
  label: Hoverfly Admin API — Logs
  description: 'Hoverfly Admin API — Logs. 1 operations. Lead operation: Get logs. Self-contained Naftiko capability covering
    one Hoverfly business surface.'
  tags:
  - Hoverfly
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HOVERFLY_API_KEY: HOVERFLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: hoverfly-logs
    baseUri: http://localhost:8888
    description: Hoverfly Admin API — Logs business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-logs
      path: /api/v2/logs
      operations:
      - name: getlogs
        method: GET
        description: Get logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: from
          in: query
          type: integer
  exposes:
  - type: rest
    namespace: hoverfly-logs-rest
    port: 8080
    description: REST adapter for Hoverfly Admin API — Logs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/logs
      name: api-v2-logs
      description: REST surface for api-v2-logs.
      operations:
      - method: GET
        name: getlogs
        description: Get logs
        call: hoverfly-logs.getlogs
        with:
          limit: rest.limit
          from: rest.from
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hoverfly-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hoverfly Admin API — Logs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-logs
      description: Get logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hoverfly-logs.getlogs
      with:
        limit: tools.limit
        from: tools.from
      outputParameters:
      - type: object
        mapping: $.
